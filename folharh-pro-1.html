<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha João DP Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090F;--surface:#0E1118;--card:#13161F;--border:#1C2235;--blue:#3B82F6;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;--cyan:#06B6D4;--orange:#F97316;--text:#E2E8F4;--muted:#5A6480;--subtle:#8490A8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;font-size:13px}
input,select,button,textarea{font-family:inherit}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-ic{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-nm{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.logo-nm span{color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sel-mes{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text);font-size:11px;font-weight:700;outline:none;cursor:pointer}
.sel-mes:focus{border-color:var(--blue)}
.btn{border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.btn-green{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:var(--green)}
.btn-blue{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:var(--blue)}
.btn-amber{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--amber)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--subtle);color:var(--text)}
.btn-grad{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff}
.main-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.nav-btn{padding:10px 14px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.main{padding:16px 20px}
.pg-title{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px}
.pg-sub{color:var(--muted);font-size:11px;margin-bottom:14px}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:860px){.panels{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.panel-hd{border-bottom:1px solid var(--border);padding:14px 16px 11px}
.co-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.co-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.co-nm{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
.co-cnpj{color:var(--muted);font-size:10px;margin-top:1px}
.co-tags{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tag{border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tb{border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.panel-body{padding:14px 16px;flex:1;overflow-y:auto;max-height:calc(100vh - 220px)}
.kg{display:grid;gap:7px;margin-bottom:12px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 12px;border-top:3px solid;transition:transform .15s}
.kc:hover{transform:translateY(-2px)}
.kl{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.kv{font-size:15px;font-weight:800;letter-spacing:-.3px}
.ks{color:var(--subtle);font-size:10px;margin-top:2px}
.sec{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;margin:12px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sec:first-child{margin-top:0}
.fr{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:8px;padding:9px 11px;margin-bottom:6px}
.fl{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.fw{position:relative}
.fp{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px 6px 26px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--blue)}
.fi.np{padding-left:8px}
.tbox{border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px;border:1px solid}
.hb{margin-bottom:7px}
.hbt{display:flex;justify-content:space-between;margin-bottom:2px}
.hbl{color:var(--text);font-size:11px}
.hbv{font-size:11px;font-weight:700}
.hbtr{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.hbf{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tr{text-align:right;font-weight:700;white-space:nowrap}
.bdg{display:inline-block;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;text-transform:uppercase}
.upz{border:2px dashed var(--border);border-radius:8px;padding:11px;cursor:pointer;background:var(--surface);text-align:center;transition:all .2s;margin-bottom:8px}
.upz:hover{border-color:var(--blue);background:rgba(59,130,246,.04)}
.upz.done{border-color:var(--green)}
.cbox{border-radius:10px;padding:12px 14px;border:1px solid;margin-top:12px}
.cbr{display:flex;justify-content:space-between;margin-bottom:5px}
.cbt{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);margin-top:2px}
.dw{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.li{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ld{width:7px;height:7px;border-radius:99px;flex-shrink:0}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px}
.bb{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:9px;padding:12px 14px;margin-bottom:8px}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;cursor:pointer;transition:all .15s;position:relative}
.mc:hover{border-color:var(--blue);transform:translateY(-2px)}
.mc.active{border-color:var(--blue);background:rgba(59,130,246,.07)}
.mc-nm{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;margin-bottom:3px}
.mc-val{font-size:14px;font-weight:800;color:var(--blue)}
.mc-sub{color:var(--muted);font-size:10px;margin-top:2px}
.mc-del{position:absolute;top:7px;right:7px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:11px;display:none;padding:2px 4px}
.mc:hover .mc-del{display:block}
.bar-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;overflow-x:auto}
.bar-chart-title{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;margin-bottom:8px}
.barch{display:flex;align-items:flex-end;gap:5px;height:90px;padding-bottom:18px;min-width:280px}
.bc{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;min-width:24px}
.bf{width:100%;border-radius:3px 3px 0 0;min-height:2px;cursor:default;position:relative;transition:height .5s ease}
.bf:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:10px;white-space:nowrap;color:var(--text);pointer-events:none;z-index:10}
.bm{color:var(--muted);font-size:9px;text-align:center;white-space:nowrap}
.mf{display:grid;gap:6px;align-items:end;margin-bottom:10px}
.div{height:1px;background:var(--border);margin:12px 0}
.api-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.api-inp{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:11px;outline:none;width:320px;font-family:inherit}
.api-inp:focus{border-color:var(--blue)}
.imp-btn{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:6px;padding:5px 13px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.imp-btn:hover{opacity:.9}
.imp-btn:disabled{opacity:.45;cursor:not-allowed}
.panel{position:relative}
.load-ov{position:absolute;inset:0;background:rgba(7,9,15,.88);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:10px}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.topbar,.main-nav,.tabs,.topbar-right,.btn-grad,.btn-ghost,.btn-amber,.upz{display:none!important}.panel-body{max-height:none!important;overflow:visible!important}.panels{grid-template-columns:1fr 1fr!important}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-ic">⚡</div>
    <span class="logo-nm">Folha João DP<span> Pro</span></span>
  </div>
  <div class="topbar-right">
    <select class="sel-mes" id="selMes" onchange="onMesChange()"></select>
    <button class="btn btn-green" onclick="salvarMes()">💾 Salvar</button>
    <button class="btn btn-blue" onclick="window.print()">📄 PDF</button>
    <button class="btn btn-amber" onclick="exportarBackup()">⬆ Backup</button>
    <button class="btn btn-ghost" onclick="document.getElementById('fR').click()">⬇ Restaurar</button>
    <input type="file" id="fR" accept=".json" style="display:none" onchange="restaurarBackup(event)">
  </div>
</div>
<div class="main-nav">
  <button class="nav-btn active" onclick="showView('paineis',this)">📊 Painéis</button>
  <button class="nav-btn" onclick="showView('historico',this)">📅 Histórico</button>
  <button class="nav-btn" onclick="showView('comparativo',this)">⚖ Comparativo</button>
</div>
<div class="api-bar">
  <span style="color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap">🔑 Chave API:</span>
  <input class="api-inp" id="apiKey" type="password" placeholder="sk-ant-api03-... (necessária para importar PDF)" oninput="saveKey(this.value)">
  <span id="apiSt" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(239,68,68,.15);color:#EF4444">Não configurada</span>
  <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--blue);font-size:10px;text-decoration:none;white-space:nowrap">Como obter a chave →</a>
</div>
<div class="main">
  <div id="view-paineis">
    <div class="pg-title">Folha de Pagamento</div>
    <p class="pg-sub" id="pgSub">Selecione um mês para começar</p>
    <div class="panels"><div id="panel1"></div><div id="panel2"></div></div>
  </div>
  <div id="view-historico" style="display:none">
    <div class="pg-title">Histórico Anual</div>
    <p class="pg-sub">Clique num mês para abrir · Passe o mouse nas barras para ver valores</p>
    <div id="histContent"></div>
  </div>
  <div id="view-comparativo" style="display:none">
    <div class="pg-title">Comparativo entre CNPJs</div>
    <p class="pg-sub">Visão consolidada do grupo SEA · Mês atual</p>
    <div id="compContent" style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CHAVE API ──────────────────────────────────────────────
function saveKey(v){
  if(v) localStorage.setItem('folharh_apikey', v);
  else localStorage.removeItem('folharh_apikey');
  checkKey();
}
function loadKey(){
  const k=localStorage.getItem('folharh_apikey')||'';
  if(k){ document.getElementById('apiKey').value=k; checkKey(); }
}
function checkKey(){
  const k=document.getElementById('apiKey').value.trim();
  const st=document.getElementById('apiSt');
  if(k && k.startsWith('sk-ant')){
    st.style.background='rgba(16,185,129,.15)'; st.style.color='#10B981'; st.textContent='✓ Configurada';
  } else {
    st.style.background='rgba(239,68,68,.15)'; st.style.color='#EF4444'; st.textContent='Não configurada';
  }
}

// ── IMPORTAR PDF COM IA ──────────────────────────────────────
async function importarPDF(empId, file){
  const apiKey = document.getElementById('apiKey').value.trim();
  if(!apiKey){ toast('Configure a Chave API primeiro','#EF4444'); return; }
  if(!file) return;

  // Show loading overlay
  const panel = document.getElementById(`panel${empId}`);
  const ov = document.createElement('div');
  ov.className = 'load-ov';
  ov.innerHTML = '<div class="spin"></div><div style="color:var(--text);font-size:12px;font-weight:600">Lendo PDF com IA...</div><div style="color:var(--muted);font-size:10px">Isso leva alguns segundos</div>';
  panel.appendChild(ov);

  try {
    const base64 = await fileToBase64(file);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
            { type: 'text', text: `Você é um especialista em folha de pagamento brasileira. Analise este PDF de folha de pagamento e extraia os totais dos resumos/totalizadores.

Retorne APENAS um JSON válido, sem markdown, sem explicação:
{
  "empresa": "nome da empresa",
  "cnpj": "xx.xxx.xxx/xxxx-xx",
  "competencia": "Mês/Ano",
  "totalFuncionarios": 0,
  "totalBruto": 0,
  "totalDescontos": 0,
  "totalLiquido": 0,
  "inssSegurados": 0,
  "inssEmpresa": 0,
  "inssTerceiros": 0,
  "inssRAT": 0,
  "fgtsGFIP": 0,
  "fgtsGRRF": 0,
  "irrfTotal": 0,
  "horasNormais": 0,
  "horasExtras": 0,
  "bolsaEstagio": 0,
  "comissoes": 0,
  "gratificacao": 0,
  "periculosidade": 0,
  "proLabore": 0
}

Instruções:
- Busque nos resumos/totais/totalizadores da folha, não nos registros individuais
- INSS Empresa = parte patronal (20% ou similar)
- INSS Terceiros = SESC, SENAC, SEBRAE, INCRA, etc
- RAT/FAP = seguro acidente trabalho
- FGTS GFIP = recolhimento mensal normal
- FGTS GRRF = rescisões
- IRRF = imposto de renda retido total
- Use apenas números sem formatação (ex: 443683.30 não R$ 443.683,30)
- Se não encontrar um campo, use 0` }
          ]
        }]
      })
    });

    if(!response.ok){
      const err = await response.json();
      throw new Error(err.error?.message || `Erro ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.map(c => c.text||'').join('') || '{}';
    const clean = text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);

    // Preenche os dados
    const emp = dados.find(e => e.id === empId);
    const campos = ['totalFuncionarios','totalBruto','totalDescontos','totalLiquido',
      'inssSegurados','inssEmpresa','inssTerceiros','inssRAT',
      'fgtsGFIP','fgtsGRRF','irrfTotal',
      'horasNormais','horasExtras','bolsaEstagio','comissoes',
      'gratificacao','periculosidade','proLabore'];
    campos.forEach(k => { if(result[k] !== undefined) emp.folha[k] = parseFloat(result[k])||0; });

    panel.removeChild(ov);
    pTabs[empId] = 'resumo';
    renderPanel(empId);
    toast(`✓ PDF importado! ${result.empresa||''} · ${result.competencia||''}`, '#10B981');

  } catch(err) {
    panel.removeChild(ov);
    toast(`Erro: ${err.message}`, '#EF4444');
    console.error(err);
  }
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Erro ao ler arquivo'));
    r.readAsDataURL(file);
  });
}

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CORES=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#EC4899','#14B8A6','#84CC16'];
const EMP_BASE=[
  {id:1,nome:'SEA TELECOM LTDA',cnpj:'25.450.139/0001-68',color:'#3B82F6',accent:'#06B6D4'},
  {id:2,nome:'SEA SERVIÇOS LTDA',cnpj:'25.450.169/0001-74',color:'#10B981',accent:'#F59E0B'}
];
const BENS=[
  {key:'ifood',icon:'🍔',nome:'iFood (Alimentação)',cor:'#F97316'},
  {key:'caju',icon:'🎁',nome:'Caju (Bonificação)',cor:'#10B981'},
  {key:'unimed',icon:'🏥',nome:'Unimed (Plano de Saúde)',cor:'#3B82F6'},
  {key:'prosa',icon:'🩺',nome:'Prosa (Plano de Saúde)',cor:'#8B5CF6'},
];

let hist={}, mesSel='', pTabs={1:'resumo',2:'resumo'}, planilhas={1:[],2:[]}, dados=novo();

function novo(){
  return EMP_BASE.map(e=>({
    id:e.id,
    folha:{totalFuncionarios:0,totalBruto:0,totalDescontos:0,totalLiquido:0,inssSegurados:0,inssEmpresa:0,inssTerceiros:0,inssRAT:0,fgtsGFIP:0,fgtsGRRF:0,irrfTotal:0,horasNormais:0,horasExtras:0,bolsaEstagio:0,comissoes:0,gratificacao:0,periculosidade:0,proLabore:0,
      guiaINSS:0,guiaFGTS:0,guiaIRRF:0},
    ben:{ifood:[],caju:[],unimed:[],prosa:[]},
    bh:{totalHoras:0,totalCompensado:0,totalHorasValor:0,totalCompensadoValor:0},
    adm:[],dem:[],pjs:[],setores:[]
  }));
}

function fix(e){
  if(!e.ben) e.ben={ifood:[],caju:[],unimed:[],prosa:[]};
  BENS.forEach(b=>{if(!e.ben[b.key])e.ben[b.key]=[];});
  if(!e.bh) e.bh={totalHoras:0,totalCompensado:0,totalHorasValor:0,totalCompensadoValor:0};
  if(!e.adm) e.adm=[];
  if(!e.dem) e.dem=[];
  if(!e.pjs) e.pjs=[];
}

const fmt=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtN=v=>new Intl.NumberFormat('pt-BR').format(Math.round(v||0));
const pct=(a,b)=>b?((a/b)*100).toFixed(1):'0.0';
const fmtD=s=>{if(!s)return '—';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;};
const fmtH=v=>{const neg=v<0,h=Math.floor(Math.abs(v)),m=Math.round((Math.abs(v)-h)*60);return `${neg?'-':''}${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}m`;};

function buildSelect(){
  const sel=document.getElementById('selMes'),now=new Date();
  sel.innerHTML='<option value="">+ Novo mês...</option>';
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=`${MESES[d.getMonth()]}/${d.getFullYear()}`;
    const o=document.createElement('option');
    o.value=key; o.textContent=hist[key]?`✓ ${lbl}`:lbl;
    if(key===mesSel) o.selected=true;
    sel.appendChild(o);
  }
}

function onMesChange(){
  const val=document.getElementById('selMes').value; if(!val) return;
  mesSel=val;
  const h=hist[val];
  if(h){dados=JSON.parse(JSON.stringify(h.empresas));planilhas[1]=h.p1||[];planilhas[2]=h.p2||[];dados.forEach(fix);}
  else dados=novo();
  const[y,m]=val.split('-');
  document.getElementById('pgSub').textContent=`Competência: ${MESES[parseInt(m)-1]}/${y} · SEA TELECOM + SEA SERVIÇOS`;
  renderAll();
}

function salvarMes(){
  if(!mesSel){toast('Selecione um mês','#EF4444');return;}
  dados.forEach(e=>{e.setores=calcSetores(e,planilhas[e.id]);});
  hist[mesSel]={mes:mesSel,empresas:JSON.parse(JSON.stringify(dados)),p1:planilhas[1],p2:planilhas[2]};
  localStorage.setItem('folharh_v4',JSON.stringify(hist));
  buildSelect(); toast('✓ Mês salvo!','#10B981');
}

function carregarLocal(){try{const r=localStorage.getItem('folharh_v4');if(r)hist=JSON.parse(r);}catch{}}

function exportarBackup(){
  const blob=new Blob([JSON.stringify({hist,planilhas},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`folharh_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('✓ Backup exportado','#10B981');
}

function restaurarBackup(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.hist){hist=d.hist;localStorage.setItem('folharh_v4',JSON.stringify(hist));}
      if(d.planilhas)planilhas=d.planilhas;
      buildSelect();renderAll();toast('✓ Backup restaurado','#10B981');
    }catch{toast('Arquivo inválido','#EF4444');}
  };
  r.readAsText(file);e.target.value='';
}

function parseOrg(txt){
  const lines=txt.trim().split('\n').filter(l=>l.trim());
  const sep=lines[0].includes(';')?';':',';
  const st=/nome|name/i.test(lines[0])?1:0,rows=[];
  for(let i=st;i<lines.length;i++){const c=lines[i].split(sep).map(x=>x.trim().replace(/^"|"$/g,''));if(c[0])rows.push({nome:c[0],setor:c[1]||'',gestor:c[2]||''});}
  return rows;
}

function parseBen(txt){
  const lines=txt.trim().split('\n').filter(l=>l.trim());
  const sep=lines[0].includes(';')?';':',';
  const st=/nome|name/i.test(lines[0])?1:0,rows=[];
  for(let i=st;i<lines.length;i++){const c=lines[i].split(sep).map(x=>x.trim().replace(/^"|"$/g,''));if(c[0]){const raw=(c[1]||'0').replace(/\./g,'').replace(',','.');rows.push({nome:c[0],valor:parseFloat(raw)||0});}}
  return rows;
}

function handleOrg(id,file){if(!file)return;const r=new FileReader();r.onload=e=>{planilhas[id]=parseOrg(e.target.result);toast(`✓ ${planilhas[id].length} colaboradores`,'#10B981');renderPanel(id);};r.readAsText(file);}

function handleBen(id,tipo,file){
  if(!file)return;const r=new FileReader();
  r.onload=e=>{const emp=dados.find(x=>x.id===id);emp.ben[tipo]=parseBen(e.target.result);const tot=emp.ben[tipo].reduce((s,x)=>s+x.valor,0);toast(`✓ ${emp.ben[tipo].length} registros · ${fmt(tot)}`,'#10B981');renderPanel(id);};
  r.readAsText(file);
}

function sumBen(emp){return BENS.reduce((s,b)=>s+(emp.ben[b.key]||[]).reduce((a,r)=>a+r.valor,0),0);}
function sumBenTipo(emp,k){return(emp.ben[k]||[]).reduce((s,r)=>s+r.valor,0);}
function custoEmp(emp){const f=emp.folha;return f.totalBruto+f.inssEmpresa+f.inssTerceiros+f.inssRAT+f.fgtsGFIP+f.fgtsGRRF+(emp.pjs||[]).reduce((s,p)=>s+p.valor,0)+sumBen(emp);}

function calcSetores(emp,pl){
  if(!pl||!pl.length)return[];
  const map={};pl.forEach(p=>{const s=p.setor||'Sem setor';if(!map[s])map[s]={nome:s,gestor:p.gestor||'',qtd:0};map[s].qtd++;});
  const total=pl.length||1,f=emp.folha;
  const pat=f.inssEmpresa+f.inssTerceiros+f.inssRAT,fgts=f.fgtsGFIP+f.fgtsGRRF;
  const encPF=(pat+fgts)/(f.totalFuncionarios||total||1),brutoPF=f.totalBruto/(f.totalFuncionarios||total||1);
  return Object.values(map).map(s=>({...s,custoSal:s.qtd*brutoPF,custoEnc:s.qtd*encPF,custoTotal:s.qtd*(brutoPF+encPF),pct:((s.qtd/total)*100).toFixed(1)})).sort((a,b)=>b.custoTotal-a.custoTotal);
}

function donut(segs,size){
  size=size||115;const r=40,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const tot=segs.reduce((s,d)=>s+d.v,0);
  if(!tot)return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="9"/></svg>`;
  let off=0,p=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="9"/>`;
  segs.forEach(s=>{const dash=(s.v/tot)*circ,gap=circ-dash,rot=(off/tot)*360-90;p+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="9" stroke-dasharray="${dash} ${gap}" style="transform-origin:${cx}px ${cy}px;transform:rotate(${rot}deg)"/>`;off+=s.v;});
  p+=`<text x="${cx}" y="${cy-3}" text-anchor="middle" fill="var(--subtle)" font-size="7.5" font-family="DM Sans" font-weight="700">TOTAL</text><text x="${cx}" y="${cy+8}" text-anchor="middle" fill="var(--text)" font-size="7.5" font-family="DM Sans" font-weight="800">${fmtN(tot)}</text>`;
  return `<svg width="${size}" height="${size}">${p}</svg>`;
}

function hbar(l,v,max,c){const w=max?Math.min(100,(v/max)*100):0;return `<div class="hb"><div class="hbt"><span class="hbl">${l}</span><span class="hbv" style="color:${c}">${fmt(v)}</span></div><div class="hbtr"><div class="hbf" style="width:${w}%;background:${c}"></div></div></div>`;}
function kc(l,v,s,c){return `<div class="kc" style="border-top-color:${c}"><div class="kl">${l}</div><div class="kv" style="color:${c}">${v}</div>${s?`<div class="ks">${s}</div>`:''}</div>`;}

function refreshGuia(id,empId,keyCalc,keyGuia){
  const emp=dados.find(e=>e.id===empId);
  const vCalc=emp.folha[keyCalc]||0, vGuia=emp.folha[keyGuia]||0;
  const diff=vGuia-vCalc;
  const diffColor=Math.abs(diff)<0.01?'#10B981':diff>0?'#EF4444':'#F59E0B';
  const diffText=Math.abs(diff)<0.01?'✓ Igual':(diff>0?`▲ +${fmt(diff)}`:`▼ ${fmt(diff)}`);
  const el=document.getElementById(`${id}_diff`);
  if(el) el.innerHTML=`<span style="color:var(--muted);font-size:10px">Diferença (Guia − Folha)</span><span style="color:${diffColor};font-size:11px;font-weight:700">${diffText}</span>`;
}

function renderPanel(empId){
  const eb=EMP_BASE.find(e=>e.id===empId),emp=dados.find(e=>e.id===empId);
  if(!emp||!eb) return;
  const c=eb.color,tab=pTabs[empId],f=emp.folha,bh=emp.bh,sH=bh.totalHoras-bh.totalCompensado;
  const custo=custoEmp(emp);
  const tags=[
    mesSel?`<span class="tag" style="color:${c};border-color:${c}40;background:${c}10">${MESES[parseInt(mesSel.split('-')[1])-1]}</span>`:'',
    f.totalFuncionarios?`<span class="tag" style="color:#10B981;border-color:#10B98140;background:#10B98110">${f.totalFuncionarios} func.</span>`:'',
    emp.adm.length?`<span class="tag" style="color:#10B981;border-color:#10B98140;background:#10B98110">+${emp.adm.length} adm</span>`:'',
    emp.dem.length?`<span class="tag" style="color:#EF4444;border-color:#EF444440;background:#EF444410">${emp.dem.length} dem</span>`:'',
    bh.totalHoras>0&&sH>0?`<span class="tag" style="color:#F59E0B;border-color:#F59E0B40;background:#F59E0B10">${fmtH(sH)} banco</span>`:'',
  ].join('');
  const TABS=['resumo','encargos','movimentação','setores','pjs','benefícios','banco de horas'];
  const tabsHtml=TABS.map(t=>`<button class="tb" onclick="setTab(${empId},'${t}')" style="background:${tab===t?c+'18':'transparent'};border-color:${tab===t?c:'var(--border)'};color:${tab===t?c:'var(--muted)'}">${t}</button>`).join('');
  const importBtn=`<label class="imp-btn" style="background:linear-gradient(135deg,${c},${eb.accent});cursor:pointer" title="Importar PDF da folha — a IA preenche todos os campos automaticamente">
    📄 Importar PDF da Folha
    <input type="file" accept=".pdf" style="display:none" onchange="importarPDF(${empId},this.files[0]);this.value=''">
  </label>`;
  let body='';
  if(tab==='resumo') body=tabResumo(emp,eb);
  else if(tab==='encargos') body=tabEncargos(emp,eb);
  else if(tab==='movimentação') body=tabMov(emp,eb);
  else if(tab==='setores') body=tabSetores(emp,eb);
  else if(tab==='pjs') body=tabPJs(emp,eb);
  else if(tab==='benefícios') body=tabBeneficios(emp,eb);
  else if(tab==='banco de horas') body=tabBancoHoras(emp,eb);
  document.getElementById(`panel${empId}`).innerHTML=`<div class="panel" style="border-top:4px solid ${c}"><div class="panel-hd" style="background:linear-gradient(135deg,${c}0D,transparent)"><div class="co-row"><div class="co-ic" style="background:${c}20">🏢</div><div><div class="co-nm">${eb.nome}</div><div class="co-cnpj">${eb.cnpj}</div></div><div class="co-tags">${tags}</div></div><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:8px">${importBtn}<div class="tabs" style="flex:1">${tabsHtml}</div></div></div><div class="panel-body">${body}</div></div>`;
}

function renderHistorico(){
  const keys=Object.keys(hist).sort(),el=document.getElementById('histContent');

  const anos=[...new Set(keys.map(k=>k.split('-')[0]))];
  let html='';
  anos.forEach(ano=>{
    const mA=keys.filter(k=>k.startsWith(ano));
    const maxV=Math.max(...mA.map(k=>hist[k].empresas.reduce((s,e)=>s+custoHistE(e),0)),1);
    const barsHtml=EMP_BASE.map(eb=>{
      const bars=mA.map(k=>{const h=hist[k],emp=h.empresas.find(e=>e.id===eb.id);if(!emp)return `<div class="bc"><div class="bf" style="height:2px;background:var(--border)" data-tip="Sem dados"></div><div class="bm">${MESES[parseInt(k.split('-')[1])-1].slice(0,3)}</div></div>`;const tot=custoHistE(emp),bH=Math.max(3,(tot/maxV)*80);return `<div class="bc"><div class="bf" style="height:${bH}px;background:${eb.color}" data-tip="${MESES[parseInt(k.split('-')[1])-1]}: ${fmt(tot)}"></div><div class="bm">${MESES[parseInt(k.split('-')[1])-1].slice(0,3)}</div></div>`;}).join('');
      return `<div class="bar-chart-wrap" style="margin-bottom:7px"><div class="bar-chart-title">${eb.nome} — ${ano}</div><div class="barch">${bars}</div></div>`;
    }).join('');
    const cardsHtml=mA.map(k=>{const h=hist[k],[y,m]=k.split('-'),tot=h.empresas.reduce((s,e)=>s+custoHistE(e),0),funcs=h.empresas.reduce((s,e)=>s+(e.folha.totalFuncionarios||0),0),adms=h.empresas.reduce((s,e)=>s+(e.adm||[]).length,0),dems=h.empresas.reduce((s,e)=>s+(e.dem||[]).length,0);return `<div class="mc ${k===mesSel?'active':''}" onclick="abrirMes('${k}')"><button class="mc-del" onclick="event.stopPropagation();deletarMes('${k}')">✕</button><div class="mc-nm">${MESES[parseInt(m)-1]}</div><div class="mc-val">${fmt(tot)}</div><div class="mc-sub">${funcs} func. · +${adms} · ${dems} dem</div></div>`;}).join('');
    const tblRows=mA.map(k=>{const h=hist[k],[y,m]=k.split('-'),tot=h.empresas.reduce((s,e)=>s+custoHistE(e),0),bruto=h.empresas.reduce((s,e)=>s+e.folha.totalBruto,0),ben=h.empresas.reduce((s,e)=>s+sumBen(e),0),funcs=h.empresas.reduce((s,e)=>s+(e.folha.totalFuncionarios||0),0),adms=h.empresas.reduce((s,e)=>s+(e.adm||[]).length,0),dems=h.empresas.reduce((s,e)=>s+(e.dem||[]).length,0);return `<tr><td style="font-weight:700">${MESES[parseInt(m)-1]} ${y}</td><td class="tr" style="color:var(--blue)">${fmt(tot)}</td><td class="tr">${fmt(bruto)}</td><td class="tr" style="color:var(--amber)">${fmt(tot-bruto)}</td><td class="tr" style="color:var(--orange)">${fmt(ben)}</td><td class="tr">${funcs}</td><td class="tr" style="color:var(--green)">+${adms}</td><td class="tr" style="color:var(--red)">${dems}</td><td><button class="btn btn-ghost" style="padding:3px 6px;font-size:9px" onclick="pdfMes('${k}')">📄 PDF</button></td></tr>`;}).join('');
    html+=`<div style="margin-bottom:20px"><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:9px">${ano}</div>${barsHtml}<div class="hist-grid">${cardsHtml}</div><div style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px;overflow-x:auto"><div class="sec" style="margin-top:0">Resumo ${ano}</div><table class="tbl"><thead><tr><th>Mês</th><th class="tr">Custo Total</th><th class="tr">Bruto</th><th class="tr">Encargos</th><th class="tr">Benefícios</th><th class="tr">Func.</th><th class="tr">Adm.</th><th class="tr">Dem.</th><th></th></tr></thead><tbody>${tblRows}</tbody></table></div></div>`;
  });
  el.innerHTML=html;
}

function custoHistE(emp){const f=emp.folha;return f.totalBruto+f.inssEmpresa+f.inssTerceiros+f.inssRAT+f.fgtsGFIP+f.fgtsGRRF+(emp.pjs||[]).reduce((s,p)=>s+p.valor,0)+sumBen(emp);}

function abrirMes(k){mesSel=k;document.getElementById('selMes').value=k;onMesChange();showView('paineis',document.querySelector('.nav-btn'));}
function deletarMes(k){if(!confirm(`Excluir ${k}?`))return;delete hist[k];localStorage.setItem('folharh_v4',JSON.stringify(hist));buildSelect();renderHistorico();toast('Mês excluído','#EF4444');}
function pdfMes(k){const pM=mesSel,pD=JSON.parse(JSON.stringify(dados));mesSel=k;if(hist[k])dados=JSON.parse(JSON.stringify(hist[k].empresas));showView('paineis',null);renderAll();setTimeout(()=>{window.print();mesSel=pM;dados=pD;renderAll();showView('historico',null);},350);}

function renderComparativo(){
  const[e1,e2]=dados,[b1,b2]=EMP_BASE,c1=custoEmp(e1),c2=custoEmp(e2),grp=c1+c2,bh1=e1.bh,bh2=e2.bh;
  const rows=[
    ['💰 Custo Total Empresa',fmt(c1),fmt(c2)],
    ['📊 Total Bruto Folha',fmt(e1.folha.totalBruto),fmt(e2.folha.totalBruto)],
    ['💳 Total Líquido',fmt(e1.folha.totalLiquido),fmt(e2.folha.totalLiquido)],
    ['👥 Funcionários',e1.folha.totalFuncionarios||'—',e2.folha.totalFuncionarios||'—'],
    ['✅ Admissões',(e1.adm||[]).length,(e2.adm||[]).length],
    ['🚪 Demissões',(e1.dem||[]).length,(e2.dem||[]).length],
    ['🤝 PJs',`${(e1.pjs||[]).length} (${fmt((e1.pjs||[]).reduce((s,p)=>s+p.valor,0))})`,`${(e2.pjs||[]).length} (${fmt((e2.pjs||[]).reduce((s,p)=>s+p.valor,0))})`],
    ['🏛️ INSS Patronal',fmt(e1.folha.inssEmpresa+e1.folha.inssTerceiros+e1.folha.inssRAT),fmt(e2.folha.inssEmpresa+e2.folha.inssTerceiros+e2.folha.inssRAT)],
    ['🏦 FGTS Total',fmt(e1.folha.fgtsGFIP+e1.folha.fgtsGRRF),fmt(e2.folha.fgtsGFIP+e2.folha.fgtsGRRF)],
    ['💼 IRRF Retido',fmt(e1.folha.irrfTotal),fmt(e2.folha.irrfTotal)],
    ['🍔 iFood',fmt(sumBenTipo(e1,'ifood')),fmt(sumBenTipo(e2,'ifood'))],
    ['🎁 Caju',fmt(sumBenTipo(e1,'caju')),fmt(sumBenTipo(e2,'caju'))],
    ['🏥 Unimed',fmt(sumBenTipo(e1,'unimed')),fmt(sumBenTipo(e2,'unimed'))],
    ['🩺 Prosa',fmt(sumBenTipo(e1,'prosa')),fmt(sumBenTipo(e2,'prosa'))],
    ['🎯 Total Benefícios',fmt(sumBen(e1)),fmt(sumBen(e2))],
    ['⏱ Saldo Banco Horas',fmtH(bh1.totalHoras-bh1.totalCompensado),fmtH(bh2.totalHoras-bh2.totalCompensado)],
    ['💳 Passivo Banco Horas (R$)',fmt(bh1.totalHorasValor-bh1.totalCompensadoValor),fmt(bh2.totalHorasValor-bh2.totalCompensadoValor)],
    ['📈 % Encargos s/ Bruto',pct(e1.folha.inssEmpresa+e1.folha.inssTerceiros+e1.folha.inssRAT+e1.folha.fgtsGFIP+e1.folha.fgtsGRRF,e1.folha.totalBruto||1)+'%',pct(e2.folha.inssEmpresa+e2.folha.inssTerceiros+e2.folha.inssRAT+e2.folha.fgtsGFIP+e2.folha.fgtsGRRF,e2.folha.totalBruto||1)+'%'],
    ['📦 Participação no Grupo',pct(c1,grp||1)+'%',pct(c2,grp||1)+'%'],
  ];
  document.getElementById('compContent').innerHTML=`<div class="kg g2" style="margin-bottom:12px">${kc(b1.nome,fmt(c1),pct(c1,grp||1)+'% do grupo',b1.color)}${kc(b2.nome,fmt(c2),pct(c2,grp||1)+'% do grupo',b2.color)}</div><div class="tbox" style="background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.25);margin-bottom:14px"><span style="font-size:13px;font-weight:700">💼 Custo Total do Grupo SEA</span><span style="font-size:14px;font-weight:800;color:var(--blue)">${fmt(grp)}</span></div><table class="tbl"><thead><tr><th>Indicador</th><th style="text-align:right;color:${b1.color}">${b1.nome}</th><th style="text-align:right;color:${b2.color}">${b2.nome}</th></tr></thead><tbody>${rows.map(([l,v1,v2])=>`<tr><td style="font-weight:600">${l}</td><td style="text-align:right;color:${b1.color};font-weight:700">${v1}</td><td style="text-align:right;color:${b2.color};font-weight:700">${v2}</td></tr>`).join('')}</tbody></table>`;
}

function showView(view,btn){
  ['paineis','historico','comparativo'].forEach(v=>document.getElementById(`view-${v}`).style.display=v===view?'':'none');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(view==='historico')renderHistorico();
  if(view==='comparativo')renderComparativo();
}

function toast(msg,cor){cor=cor||'#10B981';const t=document.getElementById('toast');t.textContent=msg;t.style.background=cor;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

carregarLocal();buildSelect();loadKey();
const now=new Date(),keyA=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
document.getElementById('selMes').value=keyA;mesSel=keyA;
if(hist[keyA]){dados=JSON.parse(JSON.stringify(hist[keyA].empresas));planilhas[1]=hist[keyA].p1||[];planilhas[2]=hist[keyA].p2||[];dados.forEach(fix);}
const[y0,m0]=keyA.split('-');
document.getElementById('pgSub').textContent=`Competência: ${MESES[parseInt(m0)-1]}/${y0} · SEA TELECOM + SEA SERVIÇOS`;
renderAll();
</script>
</body>
</html>
